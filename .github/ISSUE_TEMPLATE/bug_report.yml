name: Bug Report
description: Report a bug or unexpected behaviour
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill this out as completely as possible — vague reports are hard to act on.

  - type: dropdown
    id: project
    attributes:
      label: Project
      description: Which project is affected?
      options:
        - Unshelv'd
        - Vetviona
        - Cordite Wars — Six Fronts
        - KoshkiKode Website
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: App version, commit SHA, or "latest"
      placeholder: e.g. 1.2.0 or main@abc1234
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Where does this happen?
      multiple: true
      options:
        - Web (browser)
        - Windows
        - macOS
        - Linux
        - Android
        - iOS
        - All platforms
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: |
        Expected: ...
        Actual: ...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact steps to reliably reproduce the bug.
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste any relevant logs, error messages, or attach screenshots.
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: OS version, browser version, device model, or anything else that might help.
